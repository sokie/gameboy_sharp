name: Build and Release

# Cross-platform build that runs when you push a version tag (e.g. `git tag v1.0.0 && git push --tags`).
# Each target is published as a self-contained .NET app (no .NET install needed to run it) and bundled
# into one archive per OS/arch, then attached to a GitHub Release.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            artifact_name: gameboysharp-linux-x64
            archive_ext: tar.gz
          - os: windows-latest
            rid: win-x64
            artifact_name: gameboysharp-windows-x64
            archive_ext: zip
          # macOS Intel and Apple Silicon. These runner labels mirror the reference setup; if your
          # account doesn't have them, macos-13 (Intel) / macos-14 (arm64) are stable alternatives.
          - os: macos-15-intel
            rid: osx-x64
            artifact_name: gameboysharp-macos-x64
            archive_ext: tar.gz
          - os: macos-15
            rid: osx-arm64
            artifact_name: gameboysharp-macos-arm64
            archive_ext: tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Get version from tag
        id: get_version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      # Self-contained, single-folder publish. This pulls the per-RID native libraries (SDL3, cimgui,
      # GLFW, …) from NuGet and copies the runtime shaders, so the bundle runs on a clean machine.
      - name: Publish
        shell: bash
        run: |
          dotnet publish GameboySharp.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:DebugType=none \
            -p:DebugSymbols=false \
            -o publish

      # macOS: wrap the published payload in a real, double-clickable .app bundle and ad-hoc sign it.
      # Ad-hoc signing is free (no certificate) and makes macOS treat the app as validly signed so it
      # won't refuse to open it as "damaged". It is NOT notarization — users still clear Gatekeeper
      # once on first launch (the README documents the one-liner).
      - name: Bundle macOS .app
        if: runner.os == 'macOS'
        shell: bash
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          APP="GameboySharp.app"
          mkdir -p "$APP/Contents/MacOS"
          sed "s/__VERSION__/${VERSION#v}/g" build/macos/Info.plist > "$APP/Contents/Info.plist"
          cp -R publish/. "$APP/Contents/MacOS/"
          chmod +x "$APP/Contents/MacOS/GameboySharp"
          codesign --force --deep --sign - "$APP"
          mkdir "${{ matrix.artifact_name }}"
          mv "$APP" "${{ matrix.artifact_name }}/"
          cp README.md LICENSE "${{ matrix.artifact_name }}/" 2>/dev/null || true

      # Linux/Windows: ship the self-contained folder as-is under a single top-level directory.
      - name: Stage bundle (Linux/Windows)
        if: runner.os != 'macOS'
        shell: bash
        run: |
          cp README.md LICENSE publish/ 2>/dev/null || true
          [ -f publish/GameboySharp ] && chmod +x publish/GameboySharp || true
          mv publish "${{ matrix.artifact_name }}"

      - name: Create archive (Unix)
        if: runner.os != 'Windows'
        run: tar -czf "${{ matrix.artifact_name }}-${{ steps.get_version.outputs.VERSION }}.${{ matrix.archive_ext }}" "${{ matrix.artifact_name }}"

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "${{ matrix.artifact_name }}" -DestinationPath "${{ matrix.artifact_name }}-${{ steps.get_version.outputs.VERSION }}.${{ matrix.archive_ext }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}-${{ steps.get_version.outputs.VERSION }}.${{ matrix.archive_ext }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: List artifacts
        run: find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.get_version.outputs.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/**/*
